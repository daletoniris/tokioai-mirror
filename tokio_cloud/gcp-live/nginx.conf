worker_processes auto;
error_log /var/log/nginx/error.log warn;

events { worker_connections 1024; }

http {
    # ─── JSON Log Format ──────────────────────────────────────────────────────
    log_format waf_json escape=json
      '{"timestamp":"$time_iso8601","ip":"$remote_addr","method":"$request_method",'
      '"uri":"$request_uri","status":$status,"size":$body_bytes_sent,'
      '"user_agent":"$http_user_agent","host":"$host","referer":"$http_referer",'
      '"request_time":$request_time}';

    access_log /var/log/nginx/waf-access.log waf_json;

    # ─── Rate Limiting Zones ──────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=2r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Rate limit responses
    limit_req_status 429;

    # ─── Connection Limits ────────────────────────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # ─── Shared Security Headers ──────────────────────────────────────────────
    map $sent_http_content_type $csp_header {
        ~text/html "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self'";
        default "";
    }

    server {
        listen 80;
        server_name tokioia.com www.tokioia.com _;
        server_tokens off;

        # ─── Blocklist Enforcement ────────────────────────────────────────────
        include /etc/nginx/blocklist.conf;

        # ─── Security Headers ─────────────────────────────────────────────────
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header X-Protected-By "TokioAI WAF" always;

        # ─── General Rate Limit ───────────────────────────────────────────────
        limit_req zone=general burst=20 nodelay;
        limit_conn conn_per_ip 50;

        # ─── Honeypot Traps — any access = instant attacker ID ────────────────
        location ~ ^/(wp-admin|wp-login\.php|xmlrpc\.php|phpmyadmin|phpMyAdmin|adminer) {
            access_log /var/log/nginx/waf-access.log waf_json;
            return 403 '{"error":"forbidden","msg":"honeypot"}';
        }
        location ~ ^/(\.env|\.git|\.svn|\.hg|\.htaccess|\.htpasswd|\.DS_Store) {
            access_log /var/log/nginx/waf-access.log waf_json;
            return 403 '{"error":"forbidden","msg":"honeypot"}';
        }
        location ~ ^/(admin\.php|shell\.php|c99\.php|r57\.php|config\.php\.bak|webshell) {
            access_log /var/log/nginx/waf-access.log waf_json;
            return 403 '{"error":"forbidden","msg":"honeypot"}';
        }
        location ~ ^/(debug|telescope|_debugbar|elfinder|filemanager|_profiler) {
            access_log /var/log/nginx/waf-access.log waf_json;
            return 403 '{"error":"forbidden","msg":"honeypot"}';
        }
        location ~ ^/(solr|jenkins|manager/html|jmx-console|admin-console|actuator) {
            access_log /var/log/nginx/waf-access.log waf_json;
            return 403 '{"error":"forbidden","msg":"honeypot"}';
        }

        # ─── Strict rate limit for auth endpoints (site auth, NOT dashboard API) ─
        location ~ ^/(login|signin|auth)$ {
            limit_req zone=login burst=3 nodelay;
            return 301 https://$host$request_uri;
        }

        # ─── Health ───────────────────────────────────────────────────────────
        location /health { access_log off; return 200 "ok\n"; add_header Content-Type text/plain; }

        # ─── ACME Challenge ───────────────────────────────────────────────────
        location /.well-known/acme-challenge/ { root /var/www/certbot; }

        # ─── Dashboard Login (strict brute-force protection: 2 req/min) ──────
        location = /api/auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://dashboard-api:8000/api/auth/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Dashboard API (must be ^~ to beat regex locations) ──────────────
        location ^~ /api/ {
            limit_req zone=api burst=15 nodelay;
            proxy_pass http://dashboard-api:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;
            proxy_buffering off;
        }

        # ─── Dashboard ────────────────────────────────────────────────────────
        location ~ ^/dashboard(/|$) {
            limit_req zone=api burst=10 nodelay;
            rewrite ^/dashboard$ / break;
            rewrite ^/dashboard/(.*)$ /$1 break;
            proxy_pass http://dashboard-api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ─── Default: redirect to HTTPS ───────────────────────────────────────
        location / { return 301 https://$host$request_uri; }
    }

    server {
        listen 443 ssl;
        server_name tokioia.com www.tokioia.com _;
        ssl_certificate /ssl/fullchain.pem;
        ssl_certificate_key /ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        server_tokens off;

        # ─── Blocklist Enforcement ────────────────────────────────────────────
        include /etc/nginx/blocklist.conf;

        # ─── Security Headers ─────────────────────────────────────────────────
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $csp_header always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Protected-By "TokioAI WAF" always;

        # ─── General Rate Limit ───────────────────────────────────────────────
        limit_req zone=general burst=20 nodelay;
        limit_conn conn_per_ip 50;

        # ─── Honeypot Traps ───────────────────────────────────────────────────
        location ~ ^/(wp-admin|wp-login\.php|xmlrpc\.php|phpmyadmin|phpMyAdmin|adminer) {
            access_log /var/log/nginx/waf-access.log waf_json;
            return 403 '{"error":"forbidden","msg":"honeypot"}';
        }
        location ~ ^/(\.env|\.git|\.svn|\.hg|\.htaccess|\.htpasswd|\.DS_Store) {
            access_log /var/log/nginx/waf-access.log waf_json;
            return 403 '{"error":"forbidden","msg":"honeypot"}';
        }
        location ~ ^/(admin\.php|shell\.php|c99\.php|r57\.php|config\.php\.bak|webshell) {
            access_log /var/log/nginx/waf-access.log waf_json;
            return 403 '{"error":"forbidden","msg":"honeypot"}';
        }
        location ~ ^/(debug|telescope|_debugbar|elfinder|filemanager|_profiler) {
            access_log /var/log/nginx/waf-access.log waf_json;
            return 403 '{"error":"forbidden","msg":"honeypot"}';
        }
        location ~ ^/(solr|jenkins|manager/html|jmx-console|admin-console|actuator) {
            access_log /var/log/nginx/waf-access.log waf_json;
            return 403 '{"error":"forbidden","msg":"honeypot"}';
        }

        # ─── Strict rate limit for auth endpoints (site auth, NOT dashboard API) ─
        location ~ ^/(login|signin|auth)$ {
            limit_req zone=login burst=3 nodelay;
            proxy_pass https://82.112.247.139;
            proxy_set_header Host tokioia.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_ssl_name tokioia.com;
        }

        # ─── Health ───────────────────────────────────────────────────────────
        location /health { access_log off; return 200 "ok\n"; add_header Content-Type text/plain; }

        # ─── Dashboard Login (strict brute-force protection: 2 req/min) ──────
        location = /api/auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://dashboard-api:8000/api/auth/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Dashboard API (must be ^~ to beat regex locations) ──────────────
        location ^~ /api/ {
            limit_req zone=api burst=15 nodelay;
            proxy_pass http://dashboard-api:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;
            proxy_buffering off;
        }

        # ─── Dashboard ────────────────────────────────────────────────────────
        location ~ ^/dashboard(/|$) {
            limit_req zone=api burst=10 nodelay;
            rewrite ^/dashboard$ / break;
            rewrite ^/dashboard/(.*)$ /$1 break;
            proxy_pass http://dashboard-api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ─── Block suspicious file extensions ─────────────────────────────────
        location ~* \.(sql|bak|backup|old|orig|save|swp|tmp|log|conf|tar|gz|zip|rar|7z|dump)$ {
            access_log /var/log/nginx/waf-access.log waf_json;
            return 403 '{"error":"forbidden"}';
        }

        # ─── Default: proxy to backend ────────────────────────────────────────
        location / {
            proxy_pass https://82.112.247.139;
            proxy_set_header Host tokioia.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_ssl_name tokioia.com;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
