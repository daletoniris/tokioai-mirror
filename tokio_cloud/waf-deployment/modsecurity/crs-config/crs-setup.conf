# OWASP ModSecurity Core Rule Set Configuration
# Paranoia Level: 2 (Aumentado para mejor detección)
# Nivel 1: Default, nivel 2: Más estricto, nivel 3: Muy estricto, nivel 4: Paranoico
SecAction \
  "id:900000,\
  phase:1,\
  nolog,\
  pass,\
  t:none,\
  setvar:tx.paranoia_level=2"

# Enforce Body Processor URLENCODED
SecAction \
  "id:900010,\
  phase:1,\
  nolog,\
  pass,\
  t:none,\
  setvar:tx.allowed_request_content_type='application/x-www-form-urlencoded|multipart/form-data|text/xml|application/xml|application/x-amf|application/json'"

# Enforce Body Processor Limits
SecAction \
  "id:900011,\
  phase:1,\
  nolog,\
  pass,\
  t:none,\
  setvar:tx.max_num_args=255,\
  setvar:tx.arg_name_length=100,\
  setvar:tx.arg_length=400,\
  setvar:tx.total_arg_length=64000"

# Block Non UTF-8 Encoded Requests
SecAction \
  "id:900012,\
  phase:1,\
  nolog,\
  pass,\
  t:none,\
  setvar:tx.anomaly_score=0,\
  setvar:tx.sql_injection_score=0,\
  setvar:tx.xss_score=0,\
  setvar:tx.rfi_score=0,\
  setvar:tx.lfi_score=0,\
  setvar:tx.rce_score=0,\
  setvar:tx.php_injection_score=0,\
  setvar:tx.http_violation_score=0,\
  setvar:tx.session_fixation_score=0,\
    setvar:tx.inbound_anomaly_score_threshold=3,\
  setvar:tx.outbound_anomaly_score_threshold=4"

# HTTP Policy Settings
SecAction \
  "id:900013,\
  phase:1,\
  nolog,\
  pass,\
  t:none,\
  setvar:tx.allowed_methods='GET HEAD POST OPTIONS'"

# Content-Types Allowed
SecAction \
  "id:900014,\
  phase:1,\
  nolog,\
  pass,\
  t:none,\
  setvar:tx.allowed_request_content_type_charset='utf-8|utf-16|iso-8859-1|iso-8859-15|windows-1252'"

# Enable audit logging to Kafka (will be integrated via log processor)
SecAction \
  "id:900015,\
  phase:1,\
  nolog,\
  pass,\
  t:none,\
  setvar:tx.audit_log_destination=file,\
  setvar:tx.audit_log_file=/var/log/nginx/modsec_audit.log"

