# Configuración personalizada para usar página de error personalizada de Tokio AI
# Esta regla permite que Nginx maneje el error_page 403 en lugar de ModSecurity

# Deshabilitar respuesta personalizada de ModSecurity y permitir que Nginx maneje el 403
SecDefaultAction "phase:1,log,auditlog,pass"
SecDefaultAction "phase:2,log,auditlog,deny,status:403"

# Permitir que Nginx maneje el error_page personalizado
SecResponseBodyAccess Off



