# Configuración principal de ModSecurity
# Este archivo asegura que ModSecurity esté en modo ON (bloqueo activo)

# Activar ModSecurity en modo ON (bloquea ataques)
SecRuleEngine On

# Configuración de auditoría
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/nginx/modsec_audit.log

# Configuración de respuesta
SecDefaultAction "phase:1,log,auditlog,pass"
SecDefaultAction "phase:2,log,auditlog,deny,status:403"

# Permitir que Nginx maneje el error_page personalizado
SecResponseBodyAccess Off

# Configuración de límites
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

# Timeouts
SecPcreMatchLimit 100000
SecPcreMatchLimitRecursion 100000

# Configuración de procesamiento
SecRequestBodyAccess On
SecResponseBodyAccess Off
SecResponseBodyMimeType text/plain text/html text/xml

# Configuración de reglas CRS
# Las reglas CRS se cargan automáticamente por la imagen owasp/modsecurity-crs
# Este archivo asegura que el motor esté en modo ON







