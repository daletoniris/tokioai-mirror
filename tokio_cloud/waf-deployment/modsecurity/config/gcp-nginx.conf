server {
    listen 8080;
    server_name your-domain.com www.your-domain.com _;

    # NUEVO: Ocultar versión de nginx
    server_tokens off;
    more_set_headers "Server: Tokio AI ACIS";

    # Logging en formato JSON (definido en nginx.conf)
    access_log /var/log/nginx/access.log modsec_log;
    error_log /tmp/nginx-error.log warn;

    # ModSecurity Configuration
    modsecurity on;
    modsecurity_rules_file /etc/modsecurity/rules/modsecurity-main.conf;

    # NUEVO: Página de error personalizada para TODOS los códigos (401, 403, 404, 500, 502, 503, 504)
    error_page 401 403 404 500 502 503 504 /error-blocked.html;
    location = /error-blocked.html {
        root /usr/share/nginx/html;
        internal;
    }
    # Compatibilidad con 403-blocked.html
    location = /403-blocked.html {
        root /usr/share/nginx/html;
        internal;
    }

    # NUEVO: Servir logo
    location = /logo-tokio-removebg-preview.png {
        root /usr/share/nginx/html;
        access_log off;
    }

    # Health check endpoint (sin proxy, responde directo)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Status endpoint para monitoreo
    location /status {
        access_log off;
        return 200 "ModSecurity WAF running - Tokio AI ACIS\n";
        add_header Content-Type text/plain;
    }

    # Reverse Proxy hacia tu sitio en Hostinger
    location / {
        proxy_pass http://your-domain.com;
        
        # Headers importantes
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # SSL verification (deshabilitado para evitar problemas con Hostinger)
        proxy_ssl_verify off;
    }
}

