server {
    listen 80;
    server_name localhost;

    # NUEVO: Ocultar versión de nginx
    server_tokens off;
    more_set_headers "Server: Tokio AI ACIS";

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # NUEVO: Página de error personalizada para 403
    error_page 403 /403-blocked.html;
    location = /403-blocked.html {
        root /usr/share/nginx/html;
        internal;
    }

    # NUEVO: Servir logo
    location = /logo-tokio-removebg-preview.png {
        root /usr/share/nginx/html;
        access_log off;
    }

    # Root location
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ =404;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ModSecurity audit log location
    location /status {
        modsecurity_rules '
            SecRuleEngine DetectionOnly
            SecAuditEngine RelevantOnly
            SecAuditLogRelevantStatus "^(?:5|4(?!04))"
            SecAuditLogParts ABIJDEFHZ
            SecAuditLogType Serial
            SecAuditLog /var/log/nginx/modsec_audit.log
        ';
    }
}

