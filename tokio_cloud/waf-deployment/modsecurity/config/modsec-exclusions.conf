# Exclusiones de ModSecurity para recursos estáticos de Tokio AI
# Este archivo se carga automáticamente desde /etc/modsecurity.d/

# CRÍTICO: Logo de Tokio AI - EXCLUSIÓN ABSOLUTA
# Usar @contains porque puede venir con query strings o parámetros
SecRule REQUEST_URI "@contains /logo-tokio-removebg-preview.png" \
    "id:900001,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off,\
    ctl:auditEngine=Off"

# CRÍTICO: Favicon - Path común que NO debe bloquearse
SecRule REQUEST_URI "@contains /favicon.ico" \
    "id:900004,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off,\
    ctl:auditEngine=Off"

# Robots.txt - Path común del sitio
SecRule REQUEST_URI "@contains /robots.txt" \
    "id:900005,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off,\
    ctl:auditEngine=Off"

# Sitemap.xml - Path común del sitio
SecRule REQUEST_URI "@contains /sitemap.xml" \
    "id:900006,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off,\
    ctl:auditEngine=Off"

# Página de error personalizada de Tokio AI
SecRule REQUEST_URI "@beginsWith /error-blocked.html" \
    "id:900002,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off,\
    ctl:auditEngine=Off"

# Página 403 personalizada de Tokio AI
SecRule REQUEST_URI "@beginsWith /403-blocked.html" \
    "id:900003,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off,\
    ctl:auditEngine=Off"

# Nota: Este archivo debe ser incluido en la configuración principal de ModSecurity
# Normalmente se carga automáticamente desde /etc/modsecurity.d/
