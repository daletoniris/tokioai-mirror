# Configuración HTTP - Redirige a HTTPS
server {
    listen 8080;
    server_name airesiliencehub.space www.airesiliencehub.space _;

    # Redirigir todo HTTP a HTTPS
    return 301 https://$host$request_uri;
}

# Formato de log personalizado que captura TODOS los status codes (incluidos 403 de ModSecurity)
log_format detailed '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

# Configuración HTTPS
server {
    listen 8443 ssl;
    http2 on;
    server_name airesiliencehub.space www.airesiliencehub.space _;

    # Aumentar límites de headers para evitar "400 Bad Request"
    client_header_buffer_size 8k;
    large_client_header_buffers 4 32k;
    client_body_buffer_size 128k;
    client_max_body_size 10m;

    # Certificados SSL
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Configuración SSL moderna y segura
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    # SSL stapling deshabilitado para certificados autofirmados
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # Logging estándar - Asegurar que TODOS los requests se logueen (incluidos 403 bloqueados por ModSecurity)
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # ModSecurity Configuration
    modsecurity on;
    # Las reglas se cargan automáticamente por la imagen owasp/modsecurity-crs
    # Cargar configuración personalizada para página de error (comentado si no existe)
    # modsecurity_rules_file /etc/modsecurity/rules/custom-error-page.conf;
    
    # IPs bloqueadas automáticamente por auto-mitigation
    # Este archivo se genera dinámicamente por sync-blocked-ips-to-nginx-optimized.py
    # IMPORTANTE: El archivo siempre existe (se crea vacío si no hay IPs bloqueadas)
    include /etc/modsecurity/rules/auto-blocked-ips.conf;

    # Página personalizada de error 403 (bloqueos de Tokio AI)
    error_page 403 /403-blocked.html;

    # Health check endpoint (sin proxy) - DEBE ESTAR ANTES de location /
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Servir página de bloqueo personalizada
    location = /403-blocked.html {
        access_log off;
        root /usr/share/nginx/html;
        internal;
        default_type text/html;
    }

    # Test page para verificar logo
    location = /test-logo.html {
        root /usr/share/nginx/html;
        default_type text/html;
        access_log off;
    }

    # Status endpoint para monitoreo - Página visual
    location = /status {
        access_log off;
        root /usr/share/nginx/html;
        try_files /protected-status.html /index.html =404;
        default_type text/html;
    }

    # Servir logo para la página de status y página de bloqueo
    location = /logo.png {
        access_log off;
        root /usr/share/nginx/html;
        try_files /logo.png =404;
        add_header Cache-Control "public, max-age=31536000";
        add_header Access-Control-Allow-Origin "*";
        # Detectar tipo MIME real (puede ser JPEG con extensión .png)
        # Nginx detectará automáticamente el tipo por contenido si no especificamos default_type
        types {
            image/jpeg jpg jpeg;
            image/png png;
        }
        default_type image/png;
    }

    # Reverse Proxy hacia tu sitio en Hostinger (HTTP)
    # IMPORTANTE: Usar IP directa para evitar bucle (el dominio ahora apunta a GCP)
    location / {
        # Bloquear IPs bloqueadas (deny rules del archivo incluido arriba)
        # Backend responde con HTTP, usar HTTP en lugar de HTTPS
        set $backend_ip 82.112.247.139;  # IP original de Hostinger
        proxy_pass http://$backend_ip;  # Backend responde HTTP
        
        # Headers importantes - Evitar bucle en X-Forwarded-For
        proxy_set_header Host airesiliencehub.space;  # Hostname original para Hostinger
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;  # Solo IP del cliente real
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Buffer settings
        proxy_buffering off;
        proxy_buffer_size 4k;
        
        # Seguir redirecciones del backend
        proxy_redirect off;
    }
}

