# Configuración de páginas de error personalizadas de Tokio AI
# Este archivo se incluye en location_common.conf

# Página de error personalizada para 403
error_page 403 /403-blocked.html;
location = /403-blocked.html {
    root /usr/share/nginx/html;
    internal;
}

# Servir logo de Tokio AI
location = /logo-tokio-removebg-preview.png {
    root /usr/share/nginx/html;
    access_log off;
    add_header Cache-Control "public, max-age=31536000";
}

