user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Ocultar versión de nginx (sin headers-more para compatibilidad)
    server_tokens off;

    log_format modsec_log escape=json
        '{'
        '"time_local":"$time_local",'
        '"host":"$host",'
        '"remote_addr":"$remote_addr",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"status":"$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"modsec_status":"$modsec_status",'
        '"modsec_action":"$modsec_action",'
        '"modsec_id":"$modsec_id",'
        '"modsec_msg":"$modsec_msg"'
        '}';

    access_log /var/log/nginx/access.log modsec_log;

    # ModSecurity Configuration
    modsecurity on;
    modsecurity_rules_file /etc/nginx/modsec/main.conf;

    sendfile on;
    keepalive_timeout 65;

    # Rate limiting automático (generado por sync-rate-limits-to-nginx.py)
    # NOTA: Por ahora comentado - requiere estructura más compleja (zonas en http, limits en server)
    # include /etc/modsecurity/rules/auto-rate-limits.conf;

    include /etc/nginx/conf.d/*.conf;
}

